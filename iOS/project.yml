name: GutterGuard
options:
  bundleIdPrefix: com.shimondeitel.gutterguard
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  GutterGuard:
    type: application
    platform: iOS
    sources:
      - path: GutterGuard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gutterguard
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: GutterGuard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GutterGuardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GutterGuardTests
      - path: GutterGuard.storekit
    dependencies:
      - target: GutterGuard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gutterguard.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GutterGuardUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GutterGuardUITests
    dependencies:
      - target: GutterGuard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gutterguard.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  GutterGuard:
    build:
      targets:
        GutterGuard: all
        GutterGuardTests: [test]
        GutterGuardUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: GutterGuard.storekit
    test:
      config: Debug
      storeKitConfiguration: GutterGuard.storekit
      targets:
        - GutterGuardTests
        - GutterGuardUITests
    archive:
      config: Release
